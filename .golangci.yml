version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - gosec

linters-settings:
  gosec:
    excludes:
      - G104 # errcheck handles this
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false

issues:
  exclude-dirs:
    - specs
